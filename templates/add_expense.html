{% extends "base.html" %}

{% block title %}Add Expense - Spendly{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <header class="auth-header">
            <h1 class="auth-title">New Expense</h1>
            <p class="auth-subtitle">Record your spending details</p>
        </header>

        <div class="auth-card">
            <form action="{{ url_for('add_expense') }}" method="POST">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" step="0.01" name="amount" id="amount" class="form-input" placeholder="0.00" value="{{ amount or '' }}" required autofocus>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" name="date" id="date" class="form-input" value="{{ date or today_str }}" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select name="category" id="category" class="form-input" required>
                        <option value="" disabled {{ 'selected' if not category }}>Select a category</option>
                        {% for cat in ["Food", "Transport", "Bills", "Health", "Entertainment", "Shopping", "Other"] %}
                        <option value="{{ cat }}" {{ 'selected' if category == cat }}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" name="description" id="description" class="form-input" placeholder="What was this for?" value="{{ description or '' }}" required>
                </div>

                <button type="submit" class="btn-submit">Save Expense</button>
            </form>
        </div>

        <div class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel and go back</a>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    // Set default date to today if not set
    document.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('date');
        if (!dateInput.value) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
        }
    });
</script>
{% endblock %}
