{% extends "base.html" %}

{% block title %}Edit Expense - Spendly{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <header class="auth-header">
            <h1 class="auth-title">Edit Expense</h1>
            <p class="auth-subtitle">Update your spending details</p>
        </header>

        <div class="auth-card">
            <form action="{{ url_for('edit_expense', id=expense.id) }}" method="POST">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" step="0.01" name="amount" id="amount" class="form-input" placeholder="0.00" value="{{ amount or expense.amount }}" required autofocus>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" name="date" id="date" class="form-input" value="{{ date or expense.date }}" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select name="category" id="category" class="form-input" required>
                        {% set current_cat = category or expense.category %}
                        <option value="" disabled {{ 'selected' if not current_cat }}>Select a category</option>
                        {% for cat in ["Food", "Transport", "Bills", "Health", "Entertainment", "Shopping", "Other"] %}
                        <option value="{{ cat }}" {{ 'selected' if current_cat == cat }}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" name="description" id="description" class="form-input" placeholder="What was this for?" value="{{ description or expense.description }}" required>
                </div>

                <button type="submit" class="btn-submit">Update Expense</button>
            </form>
        </div>

        <div class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel and go back</a>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
{% endblock %}
